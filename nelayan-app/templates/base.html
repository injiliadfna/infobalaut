<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Ba Laut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a);
            background-attachment: fixed;
            min-height: 100vh; 
            color: white;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .nav-glass { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); 
        }
        /* Animasi halus */
        .hover-scale { transition: all 0.3s ease; }
        .hover-scale:hover { transform: scale(1.02); border-color: rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="w-full overflow-x-hidden">
    
    <!-- Navbar Desktop -->
    <nav class="hidden md:flex fixed top-0 left-0 right-0 z-50 nav-glass border-b border-white/10 px-10 py-4 justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter text-blue-400">INFO <span class="text-white">BA LAUT</span></h1>
        <div class="flex space-x-8 text-sm font-bold uppercase tracking-widest">
            <a href="/?lokasi={{ lokasi_aktif }}" class="hover:text-blue-400 transition">Beranda</a>
            <a href="/mingguan?lokasi={{ lokasi_aktif }}" class="hover:text-blue-400 transition">Rincian Data</a>
            <a href="/peta?lokasi={{ lokasi_aktif }}" class="hover:text-blue-400 transition">Peta</a>
            <a href="/tentang?lokasi={{ lokasi_aktif }}" class="hover:text-blue-400 transition">Tentang</a>
        </div>
    </nav>

    <!-- Konten (Responsive Container) -->
    <main class="container mx-auto px-4 pt-6 md:pt-28 pb-24 lg:px-20">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Nav Mobile -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 nav-glass border-t border-white/10 flex justify-around p-4 z-50">
        <a href="/?lokasi={{ lokasi_aktif }}" class="flex flex-col items-center {% if request.path == '/' %}text-blue-400{% else %}text-slate-400{% endif %}">
            <i class="fas fa-home text-lg"></i><span class="text-[10px] mt-1 font-bold">Home</span>
        </a>
        <a href="/mingguan?lokasi={{ lokasi_aktif }}" class="flex flex-col items-center {% if request.path == '/mingguan' %}text-blue-400{% else %}text-slate-400{% endif %}">
            <i class="fas fa-calendar-alt text-lg"></i><span class="text-[10px] mt-1 font-bold">Mingguan</span>
        </a>
        <a href="/peta?lokasi={{ lokasi_aktif }}" class="flex flex-col items-center {% if request.path == '/peta' %}text-blue-400{% else %}text-slate-400{% endif %}">
            <i class="fas fa-chart-area text-lg"></i><span class="text-[10px] mt-1 font-bold">Grafik</span>
        </a>
    </nav>

</body>
</html>
